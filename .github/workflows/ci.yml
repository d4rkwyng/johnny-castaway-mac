name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test (synthetic fixtures only — no copyrighted assets on CI)
        run: swift test
      - name: Build .saver bundle
        run: ./Scripts/build-saver.sh
