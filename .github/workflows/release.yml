name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create the release

jobs:
  build-saver:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history: the build number is the commit count

      - name: Build .saver (ad-hoc signed)
        run: ./Scripts/build-saver.sh

      - name: Build .app
        run: ./Scripts/build-app.sh

      # Signing + notarization activates when the repo has:
      #   variable CODESIGN_ID      "Developer ID Application: Name (TEAMID)"
      #   secret CERT_P12_BASE64    base64 of the exported Developer ID .p12
      #   secret CERT_P12_PASSWORD  password of that .p12
      #   secrets NOTARY_APPLE_ID / NOTARY_TEAM_ID / NOTARY_PASSWORD
      #           (Apple ID, team ID, app-specific password for notarytool)
      - name: Import signing certificate
        if: ${{ vars.CODESIGN_ID != '' }}
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.CERT_P12_BASE64 }}
          p12-password: ${{ secrets.CERT_P12_PASSWORD }}

      - name: Sign and notarize
        if: ${{ vars.CODESIGN_ID != '' }}
        env:
          CODESIGN_ID: ${{ vars.CODESIGN_ID }}
        run: |
          for bundle in "dist/JohnnyCastaway.saver" "dist/Johnny Castaway.app"; do
            codesign --force --deep --options runtime --sign "$CODESIGN_ID" "$bundle"
            ditto -c -k --keepParent "$bundle" /tmp/notarize.zip
            xcrun notarytool submit /tmp/notarize.zip \
              --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
              --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
              --password "${{ secrets.NOTARY_PASSWORD }}" --wait
            xcrun stapler staple "$bundle"
            rm /tmp/notarize.zip
          done

      - name: Zip artifacts
        run: |
          ditto -c -k --keepParent dist/JohnnyCastaway.saver dist/JohnnyCastaway-saver-${{ github.ref_name }}.zip
          ditto -c -k --keepParent "dist/Johnny Castaway.app" dist/JohnnyCastaway-app-${{ github.ref_name }}.zip
          # Combined zip (app + saver) — what the main Homebrew cask installs.
          mkdir dist/combined
          ditto dist/JohnnyCastaway.saver dist/combined/JohnnyCastaway.saver
          ditto "dist/Johnny Castaway.app" "dist/combined/Johnny Castaway.app"
          ditto -c -k dist/combined dist/JohnnyCastaway-${{ github.ref_name }}.zip

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/JohnnyCastaway-${{ github.ref_name }}.zip
            dist/JohnnyCastaway-saver-${{ github.ref_name }}.zip
            dist/JohnnyCastaway-app-${{ github.ref_name }}.zip
          body: |
            **JohnnyCastaway.saver** (screensaver) and **Johnny Castaway.app**
            (windowed player with debug keys — press H) for macOS 14+.
            `JohnnyCastaway-${{ github.ref_name }}.zip` contains both.

            Easiest install (app + screensaver, then launch the app once to
            import your resource files):
            `brew install --cask d4rkwyng/tap/johnny-castaway`

            **You must supply your own RESOURCE.MAP / RESOURCE.001** from an
            original copy of the screensaver — see the README.
